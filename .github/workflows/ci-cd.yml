name: CI/CD — To-Do API

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: todo-api

jobs:

  # ── Job 1: Tests + Cobertura ─────────────────────────────────────────────────
  test:
    name: Tests unitarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr tests con cobertura
        run: |
          python -m pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=90

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 2: Linting + Seguridad ───────────────────────────────────────────────
  lint:
    name: Linting y seguridad
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Flake8 — linting de código
        run: |
          flake8 src/ tests/ \
            --max-line-length=100 \
            --exclude=__pycache__ \
            --format=default

      - name: Bandit — análisis de seguridad
        run: |
          bandit -r src/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium || true
          bandit -r src/ --severity-level medium

      - name: Pip-audit — auditoría de dependencias
        run: pip-audit -r requirements.txt

      - name: Subir reporte de seguridad
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json

  # ── Job 3: Build Docker ──────────────────────────────────────────────────────
  build:
    name: Build imagen Docker
    runs-on: ubuntu-latest
    needs: [ test, lint ]

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Extraer metadata de la imagen
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "version=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHA_SHORT}"

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/todo-api.tar

      - name: Guardar imagen como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.meta.outputs.version }}
          path: /tmp/todo-api.tar
          retention-days: 7

  # ── Job 4: Test de integración con Docker ────────────────────────────────────
  integration:
    name: Test de integración
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar imagen Docker
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ needs.build.outputs.image-tag }}
          path: /tmp

      - name: Cargar imagen Docker
        run: docker load --input /tmp/todo-api.tar

      - name: Levantar stack completo
        run: docker compose up -d

      - name: Esperar que la API esté lista
        run: |
          echo "Esperando API..."
          for i in {1..30}; do
            if curl -sf http://localhost:5000/health; then
              echo "API lista"
              break
            fi
            sleep 2
          done

      - name: Test de integración — endpoints
        run: |
          # Test GET /
          curl -sf http://localhost:5000/ | grep "To-Do API"

          # Test POST /tasks
          TASK=$(curl -sf -X POST http://localhost:5000/tasks \
            -H "Content-Type: application/json" \
            -d '{"title": "CI Test", "description": "Pipeline test"}')
          echo $TASK | grep "CI Test"

          # Test GET /tasks
          curl -sf http://localhost:5000/tasks | grep "CI Test"

          # Test GET /health
          curl -sf http://localhost:5000/health | grep "healthy"

          echo "Todos los tests de integración pasaron"

      - name: Ver logs si falla
        if: failure()
        run: docker compose logs

      - name: Bajar stack
        if: always()
        run: docker compose down

  # ── Job 5: Deploy (solo en main) ─────────────────────────────────────────────
  deploy:
    name: Deploy — resumen
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Resumen del deploy
        run: |
          echo "## Deploy exitoso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u) |" >> $GITHUB_STEP_SUMMARY
